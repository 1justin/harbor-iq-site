<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Single clean screen -->
  <rect x="8" y="8" width="48" height="34" rx="3" fill="none" stroke="#1A1A18" stroke-width="2"/>
  <!-- Screen stand -->
  <line x1="32" y1="42" x2="32" y2="50" stroke="#1A1A18" stroke-width="2" stroke-linecap="round"/>
  <line x1="22" y1="50" x2="42" y2="50" stroke="#1A1A18" stroke-width="2" stroke-linecap="round"/>
  <!-- Single unified dashboard indicator - sidebar -->
  <line x1="18" y1="12" x2="18" y2="38" stroke="#1A1A18" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  <!-- Clean content lines (organized, not chaotic) -->
  <line x1="22" y1="16" x2="48" y2="16" stroke="#1A1A18" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  <rect x="22" y="20" width="12" height="8" rx="1.5" fill="none" stroke="#1A1A18" stroke-width="1" opacity="0.4"/>
  <rect x="36" y="20" width="12" height="8" rx="1.5" fill="none" stroke="#1A1A18" stroke-width="1" opacity="0.4"/>
  <!-- Checkmark - the key symbol -->
  <path d="M26 33 L31 38 L42 27" fill="none" stroke="#1A1A18" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
