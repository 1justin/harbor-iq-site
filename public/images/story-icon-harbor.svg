<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Harbor/shelter shape - abstract safe port -->
  <!-- Water line -->
  <path d="M4 48 C10 44 16 48 22 44 C28 48 34 44 40 48 C46 44 52 48 58 44" fill="none" stroke="#1A1A18" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Harbor walls forming a protective U shape -->
  <path d="M12 44 L12 20 C12 14 18 10 24 10" fill="none" stroke="#1A1A18" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M52 44 L52 20 C52 14 46 10 40 10" fill="none" stroke="#1A1A18" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Ship/vessel inside the harbor (simple, geometric) -->
  <path d="M24 36 L22 40 L42 40 L40 36 Z" fill="none" stroke="#1A1A18" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Mast -->
  <line x1="32" y1="24" x2="32" y2="36" stroke="#1A1A18" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Flag/pennant -->
  <path d="M32 24 L38 27 L32 30" fill="none" stroke="#1A1A18" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Beacon/light on top of harbor wall -->
  <circle cx="12" cy="16" r="3" fill="none" stroke="#1A1A18" stroke-width="1.5"/>
  <line x1="12" y1="12" x2="12" y2="10" stroke="#1A1A18" stroke-width="1" stroke-linecap="round"/>
  <line x1="8" y1="14" x2="7" y2="13" stroke="#1A1A18" stroke-width="1" stroke-linecap="round"/>
  <line x1="16" y1="14" x2="17" y2="13" stroke="#1A1A18" stroke-width="1" stroke-linecap="round"/>
</svg>
